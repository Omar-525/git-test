<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickMeet — اجتماعات خفيفة وسريعة</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0f14;
    --surface:  #161921;
    --border:   #23283a;
    --accent:   #3d6cff;
    --accent2:  #00d4aa;
    --danger:   #ff4455;
    --text:     #e8eaf0;
    --muted:    #6b7280;
    --radius:   12px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans Arabic', sans-serif; }

  /* ── LOBBY ── */
  #lobby {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem; gap: 2rem;
  }
  .logo {
    font-size: 2rem; font-weight: 600; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo span { font-family: 'IBM Plex Mono', monospace; font-weight: 400; }
  .tagline { color: var(--muted); font-size: .95rem; margin-top: -.5rem; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 420px;
    display: flex; flex-direction: column; gap: 1.2rem;
  }
  .card h2 { font-size: 1.1rem; font-weight: 500; }

  label { font-size: .85rem; color: var(--muted); display: block; margin-bottom: .35rem; }

  input[type="text"] {
    width: 100%; padding: .75rem 1rem;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: .95rem; font-family: inherit;
    transition: border-color .2s;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--accent); }

  .row { display: flex; gap: .75rem; }

  .btn {
    flex: 1; padding: .75rem 1rem; border: none; border-radius: 8px;
    font-family: inherit; font-size: .9rem; font-weight: 500; cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn:hover { opacity: .85; }

  .divider { border: none; border-top: 1px solid var(--border); }

  /* ── ROOM ── */
  #room { display: none; flex-direction: column; height: 100vh; }

  #room.active { display: flex; }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; gap: 1rem;
    padding: .75rem 1.25rem; background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .topbar .logo { font-size: 1.1rem; }
  .room-id-badge {
    margin-right: auto; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: .3rem .75rem;
    font-family: 'IBM Plex Mono', monospace; font-size: .8rem; color: var(--muted);
    cursor: pointer; transition: border-color .2s;
  }
  .room-id-badge:hover { border-color: var(--accent); color: var(--text); }
  .peer-count { font-size: .8rem; color: var(--muted); }

  /* Video grid */
  #videos {
    flex: 1; overflow: auto; display: grid; gap: 8px; padding: 8px;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    align-content: start;
  }

  .video-tile {
    position: relative; background: #111420; border-radius: 10px; overflow: hidden;
    aspect-ratio: 16/9; border: 1px solid var(--border);
  }
  .video-tile.screen-share { grid-column: 1 / -1; aspect-ratio: 16/9; }

  .video-tile video {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .video-tile.screen-share video { object-fit: contain; background: #000; }

  .tile-label {
    position: absolute; bottom: 8px; right: 8px;
    background: rgba(0,0,0,.55); backdrop-filter: blur(4px);
    border-radius: 5px; padding: .2rem .55rem;
    font-size: .75rem; color: #fff;
  }
  .tile-badge {
    position: absolute; top: 8px; left: 8px;
    background: var(--accent); border-radius: 4px; padding: .15rem .45rem;
    font-size: .7rem; font-weight: 600; color: #fff;
  }
  .avatar-placeholder {
    width: 100%; height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: .5rem;
    color: var(--muted); font-size: .85rem;
  }
  .avatar-circle {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 600; color: #fff;
  }

  /* Controls */
  .controls {
    display: flex; align-items: center; justify-content: center; gap: .75rem;
    padding: .9rem 1.25rem; background: var(--surface);
    border-top: 1px solid var(--border); flex-wrap: wrap;
  }

  .ctrl-btn {
    display: flex; flex-direction: column; align-items: center; gap: .3rem;
    padding: .65rem 1rem; border-radius: 10px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); cursor: pointer;
    font-family: inherit; font-size: .7rem; transition: all .2s; min-width: 68px;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ctrl-btn.danger { background: var(--danger); border-color: var(--danger); color: #fff; }
  .ctrl-btn.muted-state { border-color: var(--danger); color: var(--danger); }

  .ctrl-icon { font-size: 1.3rem; line-height: 1; }

  /* Status toast */
  #toast {
    position: fixed; bottom: 5.5rem; left: 50%; transform: translateX(-50%) translateY(10px);
    background: #1e2535; border: 1px solid var(--border);
    border-radius: 8px; padding: .55rem 1.2rem;
    font-size: .85rem; color: var(--text); opacity: 0;
    transition: opacity .3s, transform .3s; pointer-events: none; white-space: nowrap;
    z-index: 100;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Waiting overlay */
  .waiting {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1rem;
    background: var(--bg); text-align: center; padding: 2rem;
  }
  .pulse {
    width: 48px; height: 48px; border-radius: 50%;
    border: 3px solid var(--accent);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: .4; transform: scale(1.15); }
  }
  .waiting h3 { font-size: 1rem; font-weight: 500; }
  .waiting p  { color: var(--muted); font-size: .85rem; max-width: 260px; line-height: 1.6; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Copy feedback */
  .copied { color: var(--accent2) !important; }

  @media (max-width: 500px) {
    .ctrl-btn { min-width: 56px; padding: .55rem .7rem; }
    .ctrl-btn span:not(.ctrl-icon) { display: none; }
  }
</style>
</head>
<body>

<div id="lobby">
  <div class="logo">Quick<span>Meet</span></div>
  <p class="tagline">اجتماعات سريعة، بدون تعقيد</p>

  <div class="card">
    <h2>ابدأ أو انضم</h2>

    <div>
      <label>اسمك</label>
      <input type="text" id="nameInput" placeholder="مثال: أحمد" maxlength="20">
    </div>

    <div class="row">
      <button class="btn btn-primary" onclick="createRoom()">🚀 غرفة جديدة</button>
    </div>

    <hr class="divider">

    <div>
      <label>كود الغرفة (للانضمام)</label>
      <input type="text" id="roomInput" placeholder="أدخل كود الغرفة" maxlength="8" style="text-transform:uppercase; font-family: 'IBM Plex Mono', monospace;">
    </div>
    <button class="btn btn-secondary" onclick="joinRoom()">انضم إلى غرفة</button>
  </div>

  <p style="color:var(--muted); font-size:.8rem; text-align:center; max-width:320px; line-height:1.6;">
    ⚡ يعمل مباشرةً في المتصفح — لا يلزم تثبيت أي شيء<br>
    مشاركة الشاشة + الصوت + الكاميرا
  </p>
</div>

<div id="room">
  <div class="topbar">
    <div class="logo">Quick<span>Meet</span></div>
    <div class="room-id-badge" onclick="copyRoomId()" title="انقر للنسخ" id="roomBadge">...</div>
    <span class="peer-count" id="peerCount">أنت فقط</span>
  </div>

  <div id="videos">
    <div class="waiting" id="waitingOverlay">
      <div class="pulse"></div>
      <h3>في انتظار المشاركين…</h3>
      <p id="waitingShareHint">شارك الكود أعلاه مع من تريد الاجتماع معهم</p>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn muted-state" id="btnMic" onclick="toggleMic()">
      <span class="ctrl-icon" id="micIcon">🎙️</span>
      <span id="micLabel">صوت</span>
    </button>

    <button class="ctrl-btn" id="btnCam" onclick="toggleCam()">
      <span class="ctrl-icon" id="camIcon">📷</span>
      <span id="camLabel">كاميرا</span>
    </button>

    <button class="ctrl-btn" id="btnScreen" onclick="toggleScreen()">
      <span class="ctrl-icon">🖥️</span>
      <span>مشاركة</span>
    </button>

    <button class="ctrl-btn danger" onclick="leaveRoom()">
      <span class="ctrl-icon">📵</span>
      <span>مغادرة</span>
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════
//  QuickMeet — Pure WebRTC P2P (Mesh)
//  Signaling: FREE public PeerJS cloud server
//  Relay: FREE Metered.ca STUN/TURN Servers
// ══════════════════════════════════════════

let peer = null;
let localStream = null;
let screenStream = null;
let connections = {};    // peerId → { conn (data), call }
let myName = 'مجهول';
let currentRoom = null;
let micEnabled = false;
let camEnabled = false;
let screenSharing = false;

// ── DOM helpers ──
const $ = id => document.getElementById(id);
function showToast(msg, duration = 3000) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._to);
  t._to = setTimeout(() => t.classList.remove('show'), duration);
}

// ── Generate 6-char room ID ──
function randomCode() {
  return Math.random().toString(36).slice(2, 8).toUpperCase();
}

// ── Init PeerJS with Metered.ca STUN/TURN ──
function initPeer(id) {
  return new Promise((resolve, reject) => {
    const p = new Peer(id, {
      debug: 1, // تم التعديل لإظهار تفاصيل أسهل أثناء فحص الأخطاء
      config: {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
          // خوادم TURN/STUN المجانية من Metered.ca
          { urls: 'stun:openrelay.metered.ca:80' },
          {
            urls: 'turn:openrelay.metered.ca:80',
            username: 'openrelayproject',
            credential: 'openrelayproject'
          },
          {
            urls: 'turn:openrelay.metered.ca:443',
            username: 'openrelayproject',
            credential: 'openrelayproject'
          },
          {
            urls: 'turn:openrelay.metered.ca:443?transport=tcp',
            username: 'openrelayproject',
            credential: 'openrelayproject'
          }
        ]
      }
    });
    p.on('open', () => resolve(p));
    p.on('error', (err) => {
      console.error("PeerJS Error:", err);
      reject(err);
    });
  });
}

// ── Create local media stream ──
async function getMedia() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    micEnabled = true;
    updateMicBtn();
  } catch {
    localStream = new MediaStream();
    showToast('⚠️ لم يتم الوصول للميكروفون');
  }
}

// ── Add local tile ──
function addLocalTile() {
  removeElement('tile-local');
  const tile = createTile('tile-local', myName, true);
  const vid = tile.querySelector('video');
  vid.style.display = 'none';

  const videos = $('videos');
  const waiting = $('waitingOverlay');
  if (waiting) videos.insertBefore(tile, waiting);
  else videos.appendChild(tile);
}

function createTile(id, name, isLocal) {
  const tile = document.createElement('div');
  tile.className = 'video-tile';
  tile.id = id;

  const video = document.createElement('video');
  video.autoplay = true;
  video.playsInline = true;
  if (isLocal) video.muted = true;

  const label = document.createElement('div');
  label.className = 'tile-label';
  label.textContent = name + (isLocal ? ' (أنت)' : '');

  const avatar = document.createElement('div');
  avatar.className = 'avatar-placeholder';
  avatar.innerHTML = `<div class="avatar-circle">${(name || '?')[0].toUpperCase()}</div><span>${name}</span>`;

  tile.append(avatar, video, label);
  return tile;
}

function removeElement(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// ── Peer count update ──
function updatePeerCount() {
  const count = Object.keys(connections).length;
  $('peerCount').textContent = count === 0 ? 'أنت فقط' : `${count + 1} مشاركين`;

  const waiting = $('waitingOverlay');
  if (waiting) waiting.style.display = count > 0 ? 'none' : 'flex';
}

// ── Handle incoming call (receive remote stream) ──
function handleIncomingCall(call, remoteName) {
  call.answer(localStream || new MediaStream());
  call.on('stream', remoteStream => {
    addRemoteTile(call.peer, remoteName || 'مشارك', remoteStream);
    updatePeerCount();
  });
  call.on('close', () => { removeRemoteTile(call.peer); updatePeerCount(); });
}

function addRemoteTile(peerId, name, stream) {
  removeElement('tile-' + peerId);
  const tile = createTile('tile-' + peerId, name, false);
  const vid = tile.querySelector('video');
  const avatar = tile.querySelector('.avatar-placeholder');
  vid.srcObject = stream;

  const hasVideo = stream.getVideoTracks().length > 0;
  vid.style.display = hasVideo ? 'block' : 'none';
  avatar.style.display = hasVideo ? 'none' : 'flex';

  $('videos').appendChild(tile);

  if (name.includes('🖥️')) tile.classList.add('screen-share');
}

function removeRemoteTile(peerId) {
  removeElement('tile-' + peerId);
  removeElement('tile-screen-' + peerId);
}

// ══ CREATE ROOM ══
async function createRoom() {
  const name = $('nameInput').value.trim() || 'مضيف';
  myName = name;
  currentRoom = randomCode();

  showLobbyLoading();
  await getMedia();
  
  // الـ ID الخاص بالمضيف على السيرفر سيكون هو كود الغرفة مباشرة ليعثر عليه الضيف فوراً
  peer = await initPeer('qm-room-' + currentRoom).catch(e => {
    showToast('❌ خطأ في الاتصال: ' + e.message); hideLobbyLoading(); return null;
  });
  if (!peer) return;

  setupPeerListeners();
  enterRoom(currentRoom);
}

// ══ JOIN ROOM ══
async function joinRoom() {
  const code = $('roomInput').value.trim().toUpperCase();
  if (!code) { showToast('أدخل كود الغرفة أولاً'); return; }
  const name = $('nameInput').value.trim() || 'ضيف';
  myName = name;
  currentRoom = code;

  showLobbyLoading();
  await getMedia();
  
  // معرّف عشوائي فريد للضيف لمنع التضارب، ثم الاتصال بمعرّف الغرفة الثابت للمضيف
  const guestId = 'qm-guest-' + Math.random().toString(36).slice(2, 8).toUpperCase();
  peer = await initPeer(guestId).catch(e => {
    showToast('❌ خطأ: ' + e.message); hideLobbyLoading(); return null;
  });
  if (!peer) return;

  setupPeerListeners();
  enterRoom(code);

  // تم تعديل الربط ليتجه مباشرة إلى المضيف 'qm-room-' + code
  setTimeout(() => connectToPeer('qm-room-' + code), 800);
}

function showLobbyLoading() {
  document.querySelectorAll('#lobby .btn').forEach(b => { b.disabled = true; b.style.opacity = '.5'; });
}
function hideLobbyLoading() {
  document.querySelectorAll('#lobby .btn').forEach(b => { b.disabled = false; b.style.opacity = ''; });
}

function enterRoom(code) {
  $('lobby').style.display = 'none';
  $('room').classList.add('active');
  $('roomBadge').textContent = '📋 ' + code;
  updatePeerCount();
  addLocalTile();

  $('waitingShareHint').textContent = `أرسل الكود "${code}" لمن تريد الاجتماع معه`;
}

// ── Connect to a specific peer ──
function connectToPeer(remotePeerId) {
  const conn = peer.connect(remotePeerId, { metadata: { name: myName } });
  
  conn.on('open', () => {
    connections[remotePeerId] = connections[remotePeerId] || {};
    connections[remotePeerId].conn = conn;
    conn.send({ type: 'hello', name: myName });

    const call = peer.call(remotePeerId, localStream || new MediaStream(), { metadata: { name: myName } });
    connections[remotePeerId].call = call;
    
    call.on('stream', remoteStream => {
      const rname = connections[remotePeerId].remoteName || 'مشارك';
      addRemoteTile(remotePeerId, rname, remoteStream);
      updatePeerCount();
    });
    call.on('close', () => { removeRemoteTile(remotePeerId); updatePeerCount(); });

    showToast('✅ متصل!');
    updatePeerCount();
  });

  conn.on('data', data => {
    if (data.type === 'hello') {
      connections[remotePeerId] = connections[remotePeerId] || {};
      connections[remotePeerId].remoteName = data.name;
      
      const tile = document.getElementById('tile-' + remotePeerId);
      if (tile) {
        const lbl = tile.querySelector('.tile-label');
        if (lbl) lbl.textContent = data.name;
        const av = tile.querySelector('.avatar-placeholder span');
        if (av) av.textContent = data.name;
        const circle = tile.querySelector('.avatar-circle');
        if (circle) circle.textContent = (data.name || '?')[0].toUpperCase();
      }
    }
  });

  conn.on('error', (err) => {
    console.error("Connection Error:", err);
    showToast('⚠️ تعذّر الاتصال — تأكد من الكود أو أن المضيف متصل');
    hideLobbyLoading();
  });
}

// ── Peer event listeners ──
function setupPeerListeners() {
  peer.on('connection', conn => {
    const remoteName = conn.metadata?.name || 'مشارك';
    connections[conn.peer] = connections[conn.peer] || {};
    connections[conn.peer].conn = conn;
    connections[conn.peer].remoteName = remoteName;

    conn.on('open', () => {
      conn.send({ type: 'hello', name: myName });
      updatePeerCount();
    });
    
    conn.on('data', data => {
      if (data.type === 'hello') {
        connections[conn.peer].remoteName = data.name;
        // تحديث مظهر الكرت عند استقبال الاسم الكامل
        const tile = document.getElementById('tile-' + conn.peer);
        if(tile) {
          tile.querySelector('.tile-label').textContent = data.name;
          tile.querySelector('.avatar-circle').textContent = (data.name || '?')[0].toUpperCase();
        }
      }
    });
    
    conn.on('close', () => { delete connections[conn.peer]; updatePeerCount(); removeRemoteTile(conn.peer); });
  });

  peer.on('call', call => {
    const remoteName = call.metadata?.name || 'مشارك';
    connections[call.peer] = connections[call.peer] || {};
    connections[call.peer].call = call;
    connections[call.peer].remoteName = remoteName;
    handleIncomingCall(call, remoteName);
  });

  peer.on('disconnected', () => showToast('⚠️ انقطع الاتصال، يُعاد الاتصال...'));
  peer.on('error', e => {
    if(e.type === 'peer-not-found') {
      showToast('❌ الكود خاطئ أو أن الغرفة غير موجودة');
    } else {
      showToast('❌ خطأ: ' + e.message);
    }
    hideLobbyLoading();
  });
}

// ══ CONTROLS ══

// Mic
async function toggleMic() {
  if (!localStream) return;
  const tracks = localStream.getAudioTracks();
  if (tracks.length === 0) {
    try {
      const s = await navigator.mediaDevices.getUserMedia({ audio: true });
      s.getAudioTracks().forEach(t => localStream.addTrack(t));
      micEnabled = true;
    } catch { showToast('⚠️ لا يمكن الوصول للميكروفون'); return; }
  } else {
    micEnabled = !micEnabled;
    tracks.forEach(t => t.enabled = micEnabled);
  }
  updateMicBtn();
}
function updateMicBtn() {
  const btn = $('btnMic');
  $('micIcon').textContent = micEnabled ? '🎙️' : '🔇';
  $('micLabel').textContent = micEnabled ? 'كتم' : 'صوت';
  btn.className = 'ctrl-btn ' + (micEnabled ? '' : 'muted-state');
}

// Camera
async function toggleCam() {
  if (camEnabled) {
    localStream.getVideoTracks().forEach(t => { t.stop(); localStream.removeTrack(t); });
    camEnabled = false;
    const tile = $('tile-local');
    if (tile) {
      tile.querySelector('video').style.display = 'none';
      const av = tile.querySelector('.avatar-placeholder');
      if (av) av.style.display = 'flex';
    }
  } else {
    try {
      const vs = await navigator.mediaDevices.getUserMedia({ video: true });
      vs.getVideoTracks().forEach(t => localStream.addTrack(t));
      camEnabled = true;
      const tile = $('tile-local');
      if (tile) {
        const vid = tile.querySelector('video');
        vid.srcObject = localStream;
        vid.style.display = 'block';
        const av = tile.querySelector('.avatar-placeholder');
        if (av) av.style.display = 'none';
      }
    } catch { showToast('⚠️ لا يمكن الوصول للكاميرا'); return; }
  }
  $('btnCam').className = 'ctrl-btn ' + (camEnabled ? 'active' : '');
  $('camIcon').textContent = camEnabled ? '📷' : '📵';
  $('camLabel').textContent = camEnabled ? 'إيقاف' : 'كاميرا';
  updateRemoteStreams();
}

// Screen share
async function toggleScreen() {
  if (screenSharing) {
    stopScreenShare();
    return;
  }
  try {
    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
    screenSharing = true;
    $('btnScreen').className = 'ctrl-btn active';

    const tile = document.createElement('div');
    tile.className = 'video-tile screen-share';
    tile.id = 'tile-screen-local';
    const vid = document.createElement('video');
    vid.autoplay = true; vid.playsInline = true; vid.muted = true;
    vid.srcObject = screenStream;
    const lbl = document.createElement('div');
    lbl.className = 'tile-label';
    lbl.textContent = '🖥️ شاشتك';
    const badge = document.createElement('div');
    badge.className = 'tile-badge';
    badge.textContent = 'مشاركة';
    tile.append(vid, lbl, badge);
    $('videos').prepend(tile);

    Object.values(connections).forEach(c => {
      if (!c.call) return;
      const pc = c.call.peerConnection;
      if (!pc) return;
      const screenTrack = screenStream.getVideoTracks()[0];
      pc.getSenders().forEach(s => { if (s.track?.kind === 'video') pc.removeTrack(s); });
      pc.addTrack(screenTrack, screenStream);
    });

    screenStream.getVideoTracks()[0].addEventListener('ended', stopScreenShare);
    showToast('🖥️ بدأت مشاركة الشاشة');
  } catch (e) {
    if (e.name !== 'NotAllowedError') showToast('⚠️ تعذّرت مشاركة الشاشة');
  }
}

function stopScreenShare() {
  if (!screenSharing) return;
  screenSharing = false;
  $('btnScreen').className = 'ctrl-btn';
  if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream = null; }
  removeElement('tile-screen-local');
  updateRemoteStreams();
  showToast('⏹️ توقفت مشاركة الشاشة');
}

function updateRemoteStreams() {
  Object.values(connections).forEach(c => {
    if (!c.call) return;
    const pc = c.call.peerConnection;
    if (!pc) return;
    pc.getSenders().forEach(s => {
      if (s.track?.kind === 'video') {
        const newTrack = localStream.getVideoTracks()[0];
        if (newTrack) s.replaceTrack(newTrack);
      }
      if (s.track?.kind === 'audio') {
        const newTrack = localStream.getAudioTracks()[0];
        if (newTrack) s.replaceTrack(newTrack);
      }
    });
  });
}

// Leave
function leaveRoom() {
  if (screenStream) screenStream.getTracks().forEach(t => t.stop());
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  if (peer) peer.destroy();
  connections = {};
  screenSharing = false; camEnabled = false; micEnabled = false;
  $('room').classList.remove('active');
  $('lobby').style.display = 'flex';
  hideLobbyLoading();
  $('videos').innerHTML = '<div class="waiting" id="waitingOverlay"><div class="pulse"></div><h3>في انتظار المشاركين…</h3><p id="waitingShareHint">شارك الكود أعلاه مع من تريد الاجتماع معهم</p></div>';
  showToast('👋 غادرت الاجتماع');
}

// Copy room ID
function copyRoomId() {
  if (!currentRoom) return;
  navigator.clipboard.writeText(currentRoom).then(() => {
    const b = $('roomBadge');
    b.textContent = '✅ تم النسخ!';
    b.classList.add('copied');
    setTimeout(() => { b.textContent = '📋 ' + currentRoom; b.classList.remove('copied'); }, 2000);
  });
}

// ── Load PeerJS ──
const peerScript = document.createElement('script');
peerScript.src = 'https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js';
document.head.appendChild(peerScript);

// Enter on room input
document.addEventListener('DOMContentLoaded', () => {
  $('roomInput').addEventListener('keydown', e => { if (e.key === 'Enter') joinRoom(); });
  $('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') $('roomInput').focus(); });
});
</script>
